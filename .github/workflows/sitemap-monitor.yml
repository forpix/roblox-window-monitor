name: sitemap-monitor

# 不像 monitor.yml（gate D 小时级赛跑，被 GitHub cron 节流到 ~5h 逼得退回本地 launchd）——
# 这条线是天级现象（验证 sitemap 收录是否比 explore-api 图表更早发现新游戏），
# GitHub 免费 cron 的节流延迟完全可以接受，不需要退回本地。
on:
  schedule:
    - cron: '20 */6 * * *'   # 每 6 小时一次，错开 monitor 的 :15/:45
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sitemap-monitor
  cancel-in-progress: false

jobs:
  sitemap-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node sitemap-monitor.mjs
      - name: Commit state if changed
        # always run this even if the fetch step above exited non-zero (Part 0.2: a partial
        # shard failure now fails the job on purpose) — the health record in
        # sitemap-source-runs.jsonl must still get committed so the failure itself is
        # traceable, even though sitemap-known.json/sitemap-newly-seen.jsonl won't have changed.
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # sitemap-newly-seen.jsonl / sitemap-source-runs.jsonl only get created once they have
          # their first line — `git add` on a nonexistent path is an atomic failure (exit 128,
          # nothing staged, not even the paths that do exist), so only add what's actually there.
          FILES="state/sitemap-known.json"
          for f in state/sitemap-newly-seen.jsonl state/sitemap-source-runs.jsonl; do
            [ -f "$f" ] && FILES="$FILES $f"
          done
          git add $FILES
          if git diff --cached --quiet; then
            echo "no state changes"
            exit 0
          fi
          git commit -m "chore: update sitemap-monitor state [skip ci]"
          for attempt in 1 2 3; do
            if git pull --rebase --quiet && git push --quiet; then
              echo "pushed on attempt $attempt"
              exit 0
            fi
            echo "push attempt $attempt failed, retrying..."
            sleep $(( (RANDOM % 5) + attempt * 2 ))
          done
          echo "::error::push failed after 3 attempts"
          exit 1
